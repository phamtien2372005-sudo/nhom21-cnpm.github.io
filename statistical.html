<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống kê - Library Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/app.js"></script>
    <style>
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap:20px; margin-bottom:30px; }
        .stat-card { background:white; padding:20px; border-radius:12px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
        .stat-number { font-size:32px; font-weight:bold; color:#00BCD4; }
        .chart-container { background:white; border-radius:12px; padding:20px; margin-top:20px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
        canvas { max-height: 300px; width: 100%; }
        .top-list { margin-top:15px; }
        .top-list ol { margin-left:20px; line-height:1.8; }
        .revenue-stats { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .revenue-card { background: #f8f9fa; border-radius: 12px; padding: 15px 20px; flex: 1; min-width: 200px; text-align: center; }
        .revenue-card h4 { margin-bottom: 10px; color: #2c3e50; }
        .revenue-amount { font-size: 28px; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">THƯ VIỆN</div>
        <div class="user-profile">
            <div class="user-avatar" id="avatarInitial">TV</div>
            <div class="user-info"><strong id="userName"></strong><small id="userRole"></small></div>
        </div>
    </div>
    <div id="sidebar" class="sidebar"></div>
    <div class="main-content">
        <div class="page-title"><h2>📊 THỐNG KÊ THƯ VIỆN</h2></div>
        <div class="page-shell">
            <div class="page-card">
                <!-- Thống kê doanh thu -->
                <div class="revenue-stats" id="revenueStats">
                    <div class="revenue-card"><h4>💰 Tổng doanh thu</h4><div id="totalRevenue" class="revenue-amount">0đ</div></div>
                    <div class="revenue-card"><h4>📅 Doanh thu tháng này</h4><div id="monthlyRevenue" class="revenue-amount">0đ</div></div>
                    <div class="revenue-card"><h4>📈 Tổng số giao dịch</h4><div id="totalTransactions" class="revenue-amount">0</div></div>
                </div>
                
                <!-- Các thống kê cũ -->
                <div class="stats-grid" id="statsGrid"></div>
                
                <div class="chart-container">
                    <h3>Top sách mượn nhiều nhất</h3>
                    <div id="topBooksList" class="top-list">Đang tải...</div>
                </div>
                <div class="chart-container">
                    <h3>Top độc giả mượn nhiều nhất</h3>
                    <div id="topReadersList" class="top-list">Đang tải...</div>
                </div>
                <div class="chart-container">
                    <h3>Thống kê theo thể loại</h3>
                    <canvas id="categoryChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Doanh thu theo tháng</h3>
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    <div id="alert-container"></div>
    <script>
        let currentUser = null;
        let categoryChart = null;
        let revenueChart = null;

        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = AuthManager.getCurrentUser();
            if (!currentUser) { window.location.href = 'index.html'; return; }
            document.getElementById('userName').innerText = currentUser.full_name;
            document.getElementById('userRole').innerText = currentUser.role === 'admin' ? 'Admin' : 'Thủ thư';
            const initial = currentUser.full_name ? currentUser.full_name.charAt(0).toUpperCase() : 'U';
            document.getElementById('avatarInitial').innerText = initial;
            renderSidebar();
            await loadRevenueStats();
            await loadStats();
            await loadTopBooks();
            await loadTopReaders();
            await loadCategoryChart();
        });

        function renderSidebar() {
            const isAdmin = currentUser.role === 'admin';
            let html = '<h1>MAIN MENU</h1><ul class="nav-menu">';
            html += '<li class="nav-item"><a href="dashboard.html" class="nav-link">🏠 Trang chủ</a></li>';
            html += '<li class="nav-item"><a href="FormMuonSach.html" class="nav-link">📘 Mượn sách</a></li>';
            html += '<li class="nav-item"><a href="FormThemXoaSua.html" class="nav-link">📝 Quản lý sách</a></li>';
            html += '<li class="nav-item"><a href="FormTraCuuDocGia.html" class="nav-link">🔎 Tra cứu độc giả</a></li>';
            html += '<li class="nav-item"><a href="FormTraCuuMuonTra.html" class="nav-link">📚 Tra cứu mượn trả</a></li>';
            html += '<li class="nav-item"><a href="FormTinhTrangTaiLieu.html" class="nav-link">📄 Tình trạng sách</a></li>';
            html += '<li class="nav-item"><a href="FromTimKiem.html" class="nav-link">🔍 Tìm kiếm</a></li>';
            if (isAdmin) {
                html += '<li class="nav-item"><a href="statistical.html" class="nav-link active">📊 Thống kê</a></li>';
                html += '<li class="nav-item"><a href="admin_users.html" class="nav-link">👥 Quản lý nhân viên</a></li>';
                html += '<li class="nav-item"><a href="admin_help_requests.html" class="nav-link">📬 Yêu cầu hỗ trợ</a></li>';
                html += '<li class="nav-item"><a href="payments.html" class="nav-link">💰 Quản lý thanh toán</a></li>';
            }
            html += '</ul><h1>HỖ TRỢ</h1><ul>';
            html += '<li class="nav-item"><a href="settings.html" class="nav-link">⚙️ Cài đặt</a></li>';
            html += '<li class="nav-item"><a href="#" onclick="handleLogout()" class="nav-link">🚪 Đăng xuất</a></li></ul>';
            document.getElementById('sidebar').innerHTML = html;
        }

        // Thống kê doanh thu từ bảng payments
        async function loadRevenueStats() {
            try {
                const { total, monthly } = await SupabaseDB.getRevenueStats();
                document.getElementById('totalRevenue').innerText = total.toLocaleString() + 'đ';
                // Doanh thu tháng này
                const now = new Date();
                const currentMonth = `${now.getFullYear()}-${now.getMonth()+1}`;
                const monthlyAmount = monthly[currentMonth] || 0;
                document.getElementById('monthlyRevenue').innerText = monthlyAmount.toLocaleString() + 'đ';
                // Tổng số giao dịch
                const payments = await SupabaseDB.getAllFees();
                document.getElementById('totalTransactions').innerText = payments.length;
                // Vẽ biểu đồ doanh thu theo tháng
                const sortedMonths = Object.keys(monthly).sort();
                const monthLabels = sortedMonths.map(m => {
                    const [year, month] = m.split('-');
                    return `Th${month}/${year}`;
                });
                const monthData = sortedMonths.map(m => monthly[m]);
                const ctx = document.getElementById('revenueChart').getContext('2d');
                if (revenueChart) revenueChart.destroy();
                revenueChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: monthLabels,
                        datasets: [{
                            label: 'Doanh thu (VNĐ)',
                            data: monthData,
                            borderColor: '#00BCD4',
                            backgroundColor: 'rgba(0,188,212,0.1)',
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            } catch(e) { console.error('Lỗi tải doanh thu:', e); }
        }

        async function loadStats() {
            try {
                const books = await SupabaseDB.getBooks();
                const readers = await SupabaseDB.getReaders();
                const authors = await SupabaseDB.getAuthors();
                const borrows = await SupabaseDB.getBorrowing();
                const totalBooks = books.reduce((sum, b) => sum + (b.quantity || 0), 0);
                const activeBorrows = borrows.filter(b => !b.return_date).length;
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><div>📚</div><div class="stat-number">${totalBooks}</div><div>Tổng sách</div></div>
                    <div class="stat-card"><div>📖</div><div class="stat-number">${books.length}</div><div>Đầu sách</div></div>
                    <div class="stat-card"><div>👥</div><div class="stat-number">${readers.length}</div><div>Độc giả</div></div>
                    <div class="stat-card"><div>✍️</div><div class="stat-number">${authors.length}</div><div>Tác giả</div></div>
                    <div class="stat-card"><div>📤</div><div class="stat-number">${activeBorrows}</div><div>Đang mượn</div></div>
                    <div class="stat-card"><div>📋</div><div class="stat-number">${borrows.length}</div><div>Tổng phiếu</div></div>
                `;
            } catch(e) { console.error(e); }
        }

        async function loadTopBooks() {
            try {
                const borrows = await SupabaseDB.getBorrowing();
                const books = await SupabaseDB.getBooks();
                const countMap = new Map();
                borrows.forEach(b => { countMap.set(b.book_id, (countMap.get(b.book_id)||0) + 1); });
                const sorted = Array.from(countMap.entries()).sort((a,b)=>b[1]-a[1]).slice(0,5);
                const container = document.getElementById('topBooksList');
                if(!sorted.length) { container.innerHTML = '<p>Chưa có dữ liệu</p>'; return; }
                let html = '<ol>';
                for(let [id, cnt] of sorted){
                    const book = books.find(b=>b.id==id);
                    html += `<li><strong>${escapeHtml(book ? book.title : '?')}</strong> - ${cnt} lượt</li>`;
                }
                html += '</ol>';
                container.innerHTML = html;
            } catch(e) { console.error(e); document.getElementById('topBooksList').innerHTML = '<p>Lỗi tải dữ liệu</p>'; }
        }

        async function loadTopReaders() {
            try {
                const borrows = await SupabaseDB.getBorrowing();
                const readers = await SupabaseDB.getReaders();
                const countMap = new Map();
                borrows.forEach(b => { countMap.set(b.reader_id, (countMap.get(b.reader_id)||0) + 1); });
                const sorted = Array.from(countMap.entries()).sort((a,b)=>b[1]-a[1]).slice(0,5);
                const container = document.getElementById('topReadersList');
                if(!sorted.length) { container.innerHTML = '<p>Chưa có dữ liệu</p>'; return; }
                let html = '<ol>';
                for(let [id, cnt] of sorted){
                    const reader = readers.find(r=>r.id==id);
                    html += `<li><strong>${escapeHtml(reader ? reader.full_name : '?')}</strong> - ${cnt} lượt</li>`;
                }
                html += '</ol>';
                container.innerHTML = html;
            } catch(e) { console.error(e); document.getElementById('topReadersList').innerHTML = '<p>Lỗi tải dữ liệu</p>'; }
        }

        async function loadCategoryChart() {
            try {
                const books = await SupabaseDB.getBooks();
                const categories = await SupabaseDB.getCategories();
                const catMap = new Map();
                books.forEach(book => {
                    const cat = categories.find(c => c.id == book.category_id);
                    const name = cat ? cat.name : 'Khác';
                    catMap.set(name, (catMap.get(name)||0) + (book.quantity || 0));
                });
                const labels = Array.from(catMap.keys());
                const data = Array.from(catMap.values());
                const ctx = document.getElementById('categoryChart').getContext('2d');
                if(categoryChart) categoryChart.destroy();
                categoryChart = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ label: 'Số lượng sách', data: data, backgroundColor: '#00BCD4', borderRadius: 8 }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            } catch(e) { console.error(e); }
        }

        function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }
        function handleLogout() { AuthManager.logout(); window.location.href='index.html'; }
    </script>
</body>
</html>
