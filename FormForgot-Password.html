<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Library Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/app.js"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-layout">
            <div class="hero-card">
                <h1>Team 21 Library<br>Information Management</h1>
                <p>Phục hồi mật khẩu nhanh chóng với giao diện đơn giản.</p>
                <div class="related-links">
                    <a href="index.html">Đăng nhập</a>
                    <a href="FormRegister.html">Đăng ký</a>
                </div>
            </div>
            <div class="auth-card">
                <h2>Quên mật khẩu</h2>
                <form id="forgotForm">
                    <div class="form-group"><label>Email *</label><input type="email" id="forgotEmail" required></div>
                    <button type="submit" class="btn btn-primary btn-block">Xác nhận</button>
                    <a href="index.html" class="secondary-link">Quay lại đăng nhập</a>
                </form>
            </div>
        </div>
    </div>
    <div id="alert-container"></div>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', (e) => {
            e.preventDefault();
            UIManager.showAlert('Chức năng đang phát triển. Vui lòng liên hệ admin.', 'info');
        });
    </script>
</body>
</html>
