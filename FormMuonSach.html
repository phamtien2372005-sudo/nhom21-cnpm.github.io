<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mượn sách - Library Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/app.js"></script>
    <style>
        .borrow-table-container { overflow-x: auto; margin-top: 20px; border-radius: 12px; border: 1px solid #e0e0e0; background: white; }
        .borrow-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .borrow-table th, .borrow-table td { padding: 12px 10px; border-bottom: 1px solid #eee; text-align: left; vertical-align: middle; }
        .borrow-table th { background-color: #f8f9fc; font-weight: 600; border-bottom: 2px solid #e0e0e0; }
        .borrow-table tr:hover { background-color: #f9fafb; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-borrowed { background-color: #FFF3CD; color: #856404; }
        .status-returned { background-color: #D4EDDA; color: #155724; }
        .status-late { background-color: #F8D7DA; color: #721C24; }
        .btn-sm { padding: 5px 12px; font-size: 12px; margin: 2px; }
        .search-box { position: relative; }
        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-top: none; max-height: 200px; overflow-y: auto; z-index: 1000; display: none; }
        .search-result-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; }
        .search-result-item:hover { background-color: #f5f5f5; }
        @media (max-width: 768px) { .borrow-table th, .borrow-table td { padding: 8px 6px; font-size: 12px; } .btn-sm { padding: 4px 8px; font-size: 11px; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">THƯ VIỆN</div>
        <div class="user-profile">
            <div class="user-avatar" id="avatarInitial">TV</div>
            <div class="user-info"><strong id="userName"></strong><small id="userRole"></small></div>
        </div>
    </div>
    <div id="sidebar" class="sidebar"></div>
    <div class="main-content">
        <div class="page-title"><h2>📖 MƯỢN SÁCH</h2></div>
        <div class="page-shell">
            <div class="page-card">
                <div class="page-header"><div><h2>Mượn sách</h2><p class="subtext">Nhập thông tin độc giả và sách cần mượn</p></div></div>
                <form id="borrowForm">
                    <div class="form-group">
                        <label>Độc giả *</label>
                        <div class="search-box">
                            <input type="text" id="readerSearch" class="form-control" placeholder="Tìm kiếm độc giả..." autocomplete="off">
                            <div id="readerResults" class="search-results"></div>
                        </div>
                        <input type="hidden" id="readerId">
                    </div>
                    <div class="form-group">
                        <label>Sách *</label>
                        <select id="bookId" class="form-control" required><option value="">Chọn sách</option></select>
                    </div>
                    <div class="card-row">
                        <div class="form-group"><label>Ngày mượn *</label><input type="date" id="borrowDate" class="form-control" required></div>
                        <div class="form-group"><label>Hạn trả *</label><input type="date" id="dueDate" class="form-control" required></div>
                    </div>
                    <div class="form-group"><label>Ghi chú</label><textarea id="notes" rows="3" class="form-control" placeholder="Ghi chú thêm (nếu có)"></textarea></div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">📘 Mượn sách</button>
                        <button type="button" class="btn btn-secondary" onclick="refreshAllData()">🔄 Làm mới</button>
                    </div>
                </form>
                <div class="borrow-table-container"><div id="borrowTable">Đang tải dữ liệu...</div></div>
            </div>
        </div>
    </div>

    <!-- Modal thanh toán phí mượn sách (chỉ hiện sau khi đã tạo borrowing) -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>💰 Thanh toán phí mượn sách</h2><button class="modal-close" onclick="closePaymentModal(true)">&times;</button></div>
            <div class="form-group"><label>Số tiền cần thanh toán:</label><p id="paymentAmount" style="font-size:24px;font-weight:bold;color:#00BCD4;">0đ</p></div>
            <div class="form-group"><label>Phương thức thanh toán:</label></div>
            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <button type="button" class="btn btn-primary" onclick="selectPaymentMethod('cash')" style="flex:1;">💰 Tiền mặt</button>
                <button type="button" class="btn btn-secondary" onclick="selectPaymentMethod('banking')" style="flex:1;">🏦 Chuyển khoản</button>
            </div>
            <div id="qrContainer" style="display: none; text-align: center; margin-top: 15px;">
                <p>Quét mã QR để chuyển khoản:</p>
                <img id="qrImage" src="" style="width: 180px; height: 180px; margin: 10px auto; border:1px solid #ddd; border-radius:8px;">
                <p style="font-size: 12px; color: #666;">Ngân hàng: Vietcombank<br>Số TK: 123456789<br>Chủ TK: THU VIEN</p>
            </div>
            <div class="form-group"><label>Ghi chú thanh toán:</label><textarea id="paymentNotes" rows="2" class="form-control"></textarea></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closePaymentModal(true)">Hủy bỏ</button>
                <button id="confirmPayBtn" class="btn btn-primary" onclick="confirmPayment()">Xác nhận thanh toán</button>
            </div>
        </div>
    </div>

    <div id="alert-container"></div>
    <script>
        let allReaders = [], allBooks = [], allBorrowings = [], currentUser = null;
        let pendingBorrowData = null;         // Lưu thông tin mượn tạm thời
        let currentPaymentAmount = 0;
        let selectedMethod = 'cash';

        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = AuthManager.getCurrentUser();
            if (!currentUser) { window.location.href = 'index.html'; return; }
            document.getElementById('userName').innerText = currentUser.full_name;
            document.getElementById('userRole').innerText = currentUser.role === 'admin' ? 'Admin' : 'Thủ thư';
            document.getElementById('avatarInitial').innerText = currentUser.full_name.charAt(0).toUpperCase();
            renderSidebar();
            await loadAllData();
            setupDateDefaults();
            setupReaderSearch();
        });

        async function loadAllData() {
            allReaders = await SupabaseDB.getReaders();
            allBooks = await SupabaseDB.getBooks();
            allBorrowings = await SupabaseDB.getBorrowing();
            // Tính số sách còn lại
            const activeBorrows = allBorrowings.filter(b => !b.return_date);
            const borrowedCount = {};
            for (let b of activeBorrows) borrowedCount[b.book_id] = (borrowedCount[b.book_id] || 0) + 1;
            for (let book of allBooks) {
                book.available = book.quantity - (borrowedCount[book.id] || 0);
            }
            renderBookSelect();
            renderBorrowTable();
        }

        function renderBookSelect() {
            const select = document.getElementById('bookId');
            select.innerHTML = '<option value="">Chọn sách</option>';
            for (const book of allBooks) {
                if (book.available > 0) {
                    select.innerHTML += `<option value="${book.id}">${escapeHtml(book.title)} (còn ${book.available}/${book.quantity})</option>`;
                }
            }
        }

        function renderBorrowTable() {
            const container = document.getElementById('borrowTable');
            if (!allBorrowings.length) {
                container.innerHTML = '<div style="text-align:center;padding:40px;">📭 Chưa có phiếu mượn nào</div>';
                return;
            }
            // Kiểm tra quyền: chỉ admin mới được xóa
            const isAdmin = currentUser.role === 'admin';
            let html = `<table class="borrow-table"><thead><tr><th>Độc giả</th><th>Sách</th><th>Ngày mượn</th><th>Hạn trả</th><th>Trạng thái</th><th>Ghi chú</th><th>Hành động</th></tr></thead><tbody>`;
            for (const b of allBorrowings) {
                const reader = allReaders.find(r => r.id == b.reader_id);
                const book = allBooks.find(bk => bk.id == b.book_id);
                const isLate = !b.return_date && new Date(b.due_date) < new Date();
                let statusHtml = b.return_date ? '<span class="status-badge status-returned">✅ Đã trả</span>' : `<span class="status-badge ${isLate ? 'status-late' : 'status-borrowed'}">${isLate ? '⚠️ Quá hạn' : '📖 Đang mượn'}</span>`;
                // Hành động: nút trả sách (luôn có) và nút xóa (chỉ admin)
                let actionHtml = !b.return_date ? `<button class="btn-sm btn-primary" onclick="returnBook('${b.id}')">🔄 Trả sách</button>` : '';
                if (isAdmin) {
                    actionHtml += ` <button class="btn-sm btn-danger" onclick="deleteBorrow('${b.id}')">🗑️ Xóa</button>`;
                } else {
                    actionHtml += ` <span class="text-muted" style="font-size:12px;">(Chỉ admin xóa)</span>`;
                }
                html += `<tr>
                    <td><strong>${reader ? escapeHtml(reader.full_name) : '?'}</strong> <span style="color:#999;">(#${b.reader_id})</span></td>
                    <td>${book ? escapeHtml(book.title) : '?'}</td>
                    <td>${formatDate(b.borrow_date)}</td>
                    <td>${formatDate(b.due_date)}</td>
                    <td>${statusHtml}</td>
                    <td>${b.notes || '-'}</td>
                    <td>${actionHtml}</td>
                </tr>`;
            }
            container.innerHTML = html + '</tbody></table>';
        }

        function setupDateDefaults() {
            const today = new Date().toISOString().split('T')[0];
            const nextTwoWeeks = new Date(); nextTwoWeeks.setDate(nextTwoWeeks.getDate() + 14);
            document.getElementById('borrowDate').value = today;
            document.getElementById('dueDate').value = nextTwoWeeks.toISOString().split('T')[0];
        }

        function setupReaderSearch() {
            const input = document.getElementById('readerSearch'), results = document.getElementById('readerResults'), hidden = document.getElementById('readerId');
            function search(keyword) {
                if (!keyword.trim()) { results.style.display = 'none'; return; }
                const filtered = allReaders.filter(r => r.full_name.toLowerCase().includes(keyword.toLowerCase()) || r.id.toString().includes(keyword) || r.email.toLowerCase().includes(keyword));
                results.innerHTML = '';
                filtered.forEach(r => {
                    const div = document.createElement('div'); div.className = 'search-result-item';
                    div.innerHTML = `<span>${escapeHtml(r.full_name)}</span> <span style="color:#999;">#${r.id}</span>`;
                    div.onclick = () => { input.value = r.full_name; hidden.value = r.id; results.style.display = 'none'; };
                    results.appendChild(div);
                });
                results.style.display = filtered.length ? 'block' : 'none';
            }
            input.addEventListener('input', () => search(input.value));
            input.addEventListener('click', () => search(input.value));
            document.addEventListener('click', (e) => { if (!input.contains(e.target) && !results.contains(e.target)) results.style.display = 'none'; });
        }

        // Xử lý mượn sách: không tạo ngay, lưu tạm và hỏi thanh toán
        document.getElementById('borrowForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const readerId = parseInt(document.getElementById('readerId').value);
            const bookId = parseInt(document.getElementById('bookId').value);
            const borrowDate = document.getElementById('borrowDate').value;
            const dueDate = document.getElementById('dueDate').value;
            const notes = document.getElementById('notes').value;
            if (!readerId || !bookId || !borrowDate || !dueDate) {
                UIManager.showAlert('Vui lòng chọn đầy đủ độc giả và sách', 'error');
                return;
            }
            pendingBorrowData = { readerId, bookId, borrowDate, dueDate, notes };
            currentPaymentAmount = 10000;
            document.getElementById('paymentAmount').innerText = currentPaymentAmount.toLocaleString() + 'đ';
            selectedMethod = 'cash';
            document.getElementById('qrContainer').style.display = 'none';
            document.getElementById('confirmPayBtn').innerText = 'Xác nhận thanh toán';
            document.getElementById('paymentNotes').value = '';
            UIManager.showModal(document.getElementById('paymentModal'), true);
        });

        async function confirmPayment() {
            if (!pendingBorrowData) return;
            const method = selectedMethod;
            const notes = document.getElementById('paymentNotes').value;
            try {
                const newBorrow = await SupabaseDB.addBorrowing(pendingBorrowData);
                await SupabaseDB.recordPayment({
                    borrowingId: newBorrow.id,
                    readerId: pendingBorrowData.readerId,
                    amount: currentPaymentAmount,
                    method: method,
                    notes: `Phí mượn sách - ${notes}`
                });
                UIManager.showAlert('Mượn sách và thanh toán thành công!', 'success');
                closePaymentModal(false);
                await refreshAllData();
                document.getElementById('borrowForm').reset();
                setupDateDefaults();
                document.getElementById('readerId').value = '';
                document.getElementById('readerSearch').value = '';
                pendingBorrowData = null;
            } catch (err) {
                UIManager.showAlert('Lỗi: ' + err.message, 'error');
            }
        }

        function closePaymentModal(isCancel = false) {
            UIManager.showModal(document.getElementById('paymentModal'), false);
            if (isCancel) {
                pendingBorrowData = null;
                UIManager.showAlert('Đã hủy mượn sách', 'info');
            }
        }

        // Trả sách
        async function returnBook(borrowId) {
            const today = new Date().toISOString().split('T')[0];
            try {
                const result = await SupabaseDB.returnBook(borrowId, { returnDate: today, returnCondition: 'good', returnNotes: '' });
                if (result.lateFee > 0) {
                    if (confirm(`Sách trả quá hạn. Phí phạt: ${result.lateFee.toLocaleString()}đ. Bạn có muốn thanh toán ngay?`)) {
                        await SupabaseDB.recordPayment({
                            borrowingId: borrowId,
                            readerId: result.borrow.reader_id,
                            amount: result.lateFee,
                            method: 'cash',
                            notes: 'Phí phạt trễ hạn'
                        });
                        UIManager.showAlert(`Đã thu phí phạt ${result.lateFee.toLocaleString()}đ`, 'success');
                    } else {
                        UIManager.showAlert('Vui lòng thanh toán phí phạt sau qua trang Quản lý thanh toán', 'warning');
                    }
                } else {
                    UIManager.showAlert('Trả sách thành công!', 'success');
                }
                await refreshAllData();
            } catch (err) {
                UIManager.showAlert('Lỗi trả sách: ' + err.message, 'error');
            }
        }

        // Xóa phiếu mượn - chỉ admin mới được gọi (nút đã ẩn với thủ thư)
        async function deleteBorrow(borrowId) {
            if (currentUser.role !== 'admin') {
                UIManager.showAlert('Bạn không có quyền xóa phiếu mượn!', 'error');
                return;
            }
            if (!confirm('Xóa phiếu mượn này sẽ không thể khôi phục. Bạn chắc chắn?')) return;
            try {
                await SupabaseDB.deleteBorrowing(borrowId);
                UIManager.showAlert('Đã xóa phiếu mượn', 'success');
                await refreshAllData();
            } catch (err) {
                UIManager.showAlert('Lỗi xóa: ' + err.message, 'error');
            }
        }

        async function refreshAllData() {
            await loadAllData();
            await updateReaderStatus();
            UIManager.showAlert('Dữ liệu đã được làm mới', 'success');
        }

        async function updateReaderStatus() {
            const borrowings = await SupabaseDB.getBorrowing();
            for (const reader of allReaders) {
                const active = borrowings.some(b => b.reader_id == reader.id && !b.return_date);
                if (reader.status !== (active ? 'active' : 'inactive')) {
                    await SupabaseDB.updateReader(reader.id, { ...reader, status: active ? 'active' : 'inactive' });
                }
            }
        }

        function selectPaymentMethod(method) {
            selectedMethod = method;
            const qrContainer = document.getElementById('qrContainer');
            const confirmBtn = document.getElementById('confirmPayBtn');
            if (method === 'banking') {
                qrContainer.style.display = 'block';
                const qrData = `Chuyen khoan thanh toan thu vien: ${currentPaymentAmount} VND vao TK 123456789`;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(qrData)}`;
                document.getElementById('qrImage').src = qrUrl;
                confirmBtn.innerText = '✅ Đã chuyển khoản';
            } else {
                qrContainer.style.display = 'none';
                confirmBtn.innerText = 'Xác nhận thanh toán';
            }
        }

        function formatDate(d) { return d ? new Date(d).toLocaleDateString('vi-VN') : '-'; }
        function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;') : ''; }
        function handleLogout() { AuthManager.logout(); window.location.href = 'index.html'; }

        function renderSidebar() {
            const isAdmin = currentUser.role === 'admin';
            const isLibrarian = currentUser.role === 'librarian';
            let html = '<h1>MAIN MENU</h1><ul class="nav-menu">';
            html += '<li class="nav-item"><a href="dashboard.html" class="nav-link">🏠 Trang chủ</a></li>';
            html += '<li class="nav-item"><a href="FormMuonSach.html" class="nav-link active">📘 Mượn sách</a></li>';
            html += '<li class="nav-item"><a href="FormThemXoaSua.html" class="nav-link">📝 Quản lý sách</a></li>';
            html += '<li class="nav-item"><a href="FormTraCuuDocGia.html" class="nav-link">🔎 Tra cứu độc giả</a></li>';
            html += '<li class="nav-item"><a href="FormTraCuuMuonTra.html" class="nav-link">📚 Tra cứu mượn trả</a></li>';
            html += '<li class="nav-item"><a href="FormTinhTrangTaiLieu.html" class="nav-link">📄 Tình trạng sách</a></li>';
            html += '<li class="nav-item"><a href="FromTimKiem.html" class="nav-link">🔍 Tìm kiếm</a></li>';
            if (isAdmin) {
                html += '<li class="nav-item"><a href="statistical.html" class="nav-link">📊 Thống kê</a></li>';
                html += '<li class="nav-item"><a href="admin_users.html" class="nav-link">👥 Quản lý nhân viên</a></li>';
                html += '<li class="nav-item"><a href="admin_help_requests.html" class="nav-link">📬 Yêu cầu hỗ trợ</a></li>';
                html += '<li class="nav-item"><a href="payments.html" class="nav-link">💰 Quản lý thanh toán</a></li>';
            }
            html += '</ul><h1>HỖ TRỢ</h1><ul>';
            html += '<li class="nav-item"><a href="settings.html" class="nav-link">⚙️ Cài đặt</a></li>';
            if (isLibrarian) html += '<li class="nav-item"><a href="help.html" class="nav-link">❓ Trợ giúp</a></li>';
            html += '<li class="nav-item"><a href="#" onclick="handleLogout()" class="nav-link">🚪 Đăng xuất</a></li></ul>';
            document.getElementById('sidebar').innerHTML = html;
        }
    </script>
</body>
</html>
