<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Library Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/app.js"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-layout">
            <div class="hero-card"><h1>Đăng ký tài khoản</h1><p>Tạo tài khoản thủ thư mới</p></div>
            <div class="auth-card">
                <h2>Đăng ký</h2>
                <form id="registerForm">
                    <div class="form-group"><label>Họ tên *</label><input type="text" id="fullName" required></div>
                    <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
                    <div class="form-group"><label>Tên đăng nhập *</label><input type="text" id="username" required></div>
                    <div class="form-group"><label>Mật khẩu *</label><input type="password" id="password" required></div>
                    <div class="form-group"><label>Xác nhận mật khẩu *</label><input type="password" id="confirmPassword" required></div>
                    <button type="submit" class="btn btn-primary btn-block">Đăng ký</button>
                    <a href="index.html" class="secondary-link">Đã có tài khoản? Đăng nhập</a>
                </form>
            </div>
        </div>
    </div>
    <div id="alert-container"></div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (!fullName || !email || !username || !password) return UIManager.showAlert('Vui lòng điền đầy đủ', 'error');
            if (password !== confirm) return UIManager.showAlert('Mật khẩu không khớp', 'error');
            const result = await AuthManager.register(username, password, fullName, email);
            if (result.success) {
                UIManager.showAlert('Đăng ký thành công!', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                UIManager.showAlert(result.message, 'error');
            }
        });
    </script>
</body>
</html>
