<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Library Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/app.js"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-layout">
            <div class="hero-card">
                <h1>Team 21 Library<br>Information Management</h1>
                <p>Hệ thống quản lý thư viện dành cho Admin và Thủ thư</p>
                <div class="related-links">
                    <a href="FormRegister.html">Đăng ký tài khoản</a>
                    <a href="FormForgot-Password.html">Quên mật khẩu</a>
                </div>
            </div>
            <div class="auth-card">
                <h2>Đăng nhập</h2>
                <form id="loginForm">
                    <div class="form-group"><label>Tên đăng nhập *</label><input type="text" id="loginUsername" placeholder="Tên đăng nhập"></div>
                    <div class="form-group"><label>Mật khẩu *</label><input type="password" id="loginPassword" placeholder="Mật khẩu"></div>
                    <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
                    <a href="FormRegister.html" class="btn btn-secondary btn-block">Đăng ký</a>
                </form>
            </div>
        </div>
    </div>
    <div id="alert-container"></div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const result = await AuthManager.login(username, password);
            if (result.success) {
                UIManager.showAlert('Đăng nhập thành công!', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } else {
                UIManager.showAlert(result.message, 'error');
            }
        });
    </script>
</body>
</html>
